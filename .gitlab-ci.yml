stages:
  - test
  - merge
  - deploy

# -----------------------------
# 1. Тестирование без docker build
# -----------------------------
test_job:
  stage: test
  image: python:3.11
  before_script:
    - pip install -r requirements.txt
  script:
    - pytest -c pytest.ini
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'
      when: on_success
    - when: never

# -----------------------------
# 2. Автоматическое подтверждение merge
# -----------------------------
auto_merge:
  stage: merge
  image: alpine:latest
  script:
    - apk add --no-cache curl jq
    - |
      curl --request PUT \
        --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/merge"
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master" && $CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never

# -----------------------------
# 3. Деплой: git pull + restart compose
# -----------------------------
deploy_prod:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client git docker-cli
    - mkdir -p ~/.ssh
    - echo "$ssh_key" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo "$known_key" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - echo "Deploying to $deploy_ip:$deploy_path"
    - ssh -i ~/.ssh/id_rsa root@$deploy_ip "cd $deploy_path && git pull origin master"
    - ssh -i ~/.ssh/id_rsa root@$deploy_ip "cd $deploy_path && docker compose pull && docker compose up -d"
  only:
    - master
