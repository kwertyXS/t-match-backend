name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DO Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_CR_USERNAME }}
          password: ${{ secrets.DO_CR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ lower(github.repository) }}:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ lower(github.repository) }}:latest
            registry.digitalocean.com/${{ secrets.DO_CR_REGISTRY }}/backend:${{ github.event.workflow_run.head_sha }}
            registry.digitalocean.com/${{ secrets.DO_CR_REGISTRY }}/backend:latest

      - name: Save image archive
        run: |
          docker pull ghcr.io/${{ lower(github.repository) }}:${{ github.event.workflow_run.head_sha }}
          docker save ghcr.io/${{ lower(github.repository) }}:${{ github.event.workflow_run.head_sha }} | gzip > backend-image.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.workflow_run.run_number }}
          name: Release v${{ github.event.workflow_run.run_number }}
          body: |
            ## Docker Image
            - `ghcr.io/${{ lower(github.repository) }}:${{ github.event.workflow_run.head_sha }}`
            - `registry.digitalocean.com/${{ secrets.DO_CR_REGISTRY }}/backend:${{ github.event.workflow_run.head_sha }}`
          files: backend-image.tar.gz
          generate_release_notes: true
