name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DO Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_CR_USERNAME }}
          password: ${{ secrets.DO_CR_TOKEN }}

      - name: Prepare image tags
        id: prep
        run: |
          echo "repo_path=${{ github.repository_owner }}/${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_OUTPUT
          echo "version=1.${{ github.event.workflow_run.run_number }}" >> $GITHUB_OUTPUT

      # Оптимизировано: собираем, пушим в CR и ОДНОВРЕМЕННО сохраняем локальный tar-архив
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo_path }}:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ steps.prep.outputs.repo_path }}:latest
            ghcr.io/${{ steps.prep.outputs.repo_path }}:${{ steps.prep.outputs.version }}
            registry.digitalocean.com/${{ secrets.DO_CR_REGISTRY }}/backend:${{ github.event.workflow_run.head_sha }}
            registry.digitalocean.com/${{ secrets.DO_CR_REGISTRY }}/backend:latest
            registry.digitalocean.com/${{ secrets.DO_CR_REGISTRY }}/backend:${{ steps.prep.outputs.version }}
          outputs: type=docker,dest=backend-image.tar

      # Просто архивируем уже готовый tar-файл, не скачивая его заново из интернета
      - name: Compress image archive
        run: gzip -9 backend-image.tar

      - name: Update Helm chart version
        run: |
          VERSION="${{ steps.prep.outputs.version }}"
          sed -i "s/^version:.*/version: $VERSION/" helm/backend/Chart.yaml
          sed -i "s/appVersion:.*/appVersion: \"$VERSION\"/" helm/backend/Chart.yaml
          sed -i "s/tag:.*/tag: \"$VERSION\"/" helm/backend/values.yaml

      - name: Commit and push Helm chart changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/backend/Chart.yaml helm/backend/values.yaml
          git commit -m "Bump Helm chart version to ${{ steps.prep.outputs.version }} [skip ci]"
          git push origin HEAD:master || echo "Push failed (non-critical)"
