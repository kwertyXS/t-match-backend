name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DO Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_CR_USERNAME }}
          password: ${{ secrets.DO_CR_TOKEN }}

      - name: Prepare image tags
        id: prep
        run: |
          echo "repo_path=${{ github.repository_owner }}/${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_OUTPUT

      # Оптимизировано: собираем, пушим в CR и ОДНОВРЕМЕННО сохраняем локальный tar-архив
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo_path }}:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ steps.prep.outputs.repo_path }}:latest
            registry.digitalocean.com/${{ secrets.DO_CR_REGISTRY }}/backend:${{ github.event.workflow_run.head_sha }}
            registry.digitalocean.com/${{ secrets.DO_CR_REGISTRY }}/backend:latest
          outputs: type=docker,dest=backend-image.tar

      # Просто архивируем уже готовый tar-файл, не скачивая его заново из интернета
      - name: Compress image archive
        run: gzip -9 backend-image.tar

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.workflow_run.run_number }}
          name: Release v${{ github.event.workflow_run.run_number }}
          body: |
            ## Как запустить

            ```
            docker pull ghcr.io/${{ steps.prep.outputs.repo_path }}:${{ github.event.workflow_run.head_sha }}
            docker run -d -p 8000:8000 ghcr.io/${{ steps.prep.outputs.repo_path }}:${{ github.event.workflow_run.head_sha }}
            ```
          files: backend-image.tar.gz
          draft: true
          generate_release_notes: true
