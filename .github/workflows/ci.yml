name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Create .env file
        run: cp .env.example .env

      - name: Run tests
        run: uv run pytest

      - name: Run linter
        run: uv run pre-commit run --all-files
