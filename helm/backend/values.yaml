replicaCount: 4

image:
  repository: registry.digitalocean.com/kwerty/backend
  tag: ~latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: kwerty.ru
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: kwerty-tls
      hosts:
        - kwerty.ru

clusterIssuer:
  create: true
  name: letsencrypt-prod
  email: kwertyXS1@gmail.com
  solvers:
    - http01:
        ingress:
          class: nginx

existingSecret: backend-secrets

command:
  - sh
  - -c
  - alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000

probes:
  liveness:
    path: /docs
    port: 8000
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /docs
    port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
